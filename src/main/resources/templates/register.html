<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Shetkari-Kamgar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link rel="stylesheet" href="/custom-theme.css">
  
  <style>
    .bg-orange { background-color: #f97316 !important; color: white !important; }
    .btn-orange { background-color: #f97316 !important; color: white !important; border: none; }
    .btn-orange:hover { background-color: #ea580c !important; }
    .text-orange { color: #f97316 !important; }
    .text-orange:hover { color: #ea580c !important; }
  </style>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-orange text-center">
          <h4><i class="bi bi-person-plus"></i> <span data-i18n="register_title">Register for Shetkari-Kamgar</span></h4>
        </div>
        <div class="card-body">
          <form th:action="@{/register}" method="post">
            <div class="mb-3">
              <label for="name" class="form-label" data-i18n="full_name">Full Name</label>
              <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
              <label for="mobile" class="form-label" data-i18n="mobile_number">Mobile Number</label>
              <input type="tel" class="form-control" id="mobile" name="mobile" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label" data-i18n="password">Password</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
              <label for="role" class="form-label" data-i18n="role">Role</label>
              <select class="form-select" id="role" name="role" required>
                <option value="" data-i18n="select_role">Select Role</option>
                <option value="Farmer" data-i18n="farmer">Farmer</option>
                <option value="Worker" data-i18n="worker_helper">Worker (Helper)</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="gender" class="form-label" data-i18n="gender">Gender</label>
              <select class="form-select" id="gender" name="gender" required>
                <option value="" data-i18n="select_gender">Select Gender</option>
                <option value="Male" data-i18n="male">Male</option>
                <option value="Female" data-i18n="female">Female</option>
              </select>
            </div>

            <div class="mb-3 p-3 bg-light border rounded">
              <label class="form-label fw-bold text-success"><i class="bi bi-geo-alt-fill"></i> Select Location</label>
              
              <div class="mb-2">
                <select class="form-select" id="stateSelector" onchange="loadDistricts()" required>
                  <option value="">1. Select State</option>
                  <option th:each="state : ${states}" th:value="${state}" th:text="${state}"></option>
                </select>
              </div>

              <div class="mb-2">
                <select class="form-select" id="districtSelector" onchange="loadTowns()" required disabled>
                  <option value="">2. First Select State</option>
                </select>
              </div>

              <div>
                <select class="form-select border-success" id="town" name="townId" required disabled>
                  <option value="">3. First Select District</option>
                </select>
              </div>
            </div>
            
            <button type="submit" class="btn btn-orange w-100 mt-3" data-i18n="navbar_register">Register</button>
          </form>
        </div>
        <div class="card-footer text-center">
          <a href="/" class="text-decoration-none text-orange" data-i18n="back_to_home">Back to Home</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/translations.js"></script>

<script>
  // Function 1: Fetch and load Districts when a State is selected
  async function loadDistricts() {
    const state = document.getElementById("stateSelector").value;
    const districtSelect = document.getElementById("districtSelector");
    const townSelect = document.getElementById("town");

    // Reset downstream dropdowns
    districtSelect.innerHTML = '<option value="">2. Select District</option>';
    districtSelect.disabled = true;
    townSelect.innerHTML = '<option value="">3. First Select District</option>';
    townSelect.disabled = true;

    if (!state) return;

    try {
      // Call our new API endpoint
      const response = await fetch(`/api/locations/districts?state=${encodeURIComponent(state)}`);
      const districts = await response.json();

      if (districts.length > 0) {
        districts.forEach(d => {
          let option = document.createElement("option");
          option.value = d;
          option.textContent = d;
          districtSelect.appendChild(option);
        });
        districtSelect.disabled = false;
      } else {
        districtSelect.innerHTML = '<option value="">No districts found</option>';
      }
    } catch (error) {
      console.error("Error fetching districts:", error);
    }
  }

  // Function 2: Fetch and load Villages when a District is selected
  async function loadTowns() {
    const state = document.getElementById("stateSelector").value;
    const district = document.getElementById("districtSelector").value;
    const townSelect = document.getElementById("town");

    // Reset the village dropdown
    townSelect.innerHTML = '<option value="">3. Select Village / Town</option>';
    townSelect.disabled = true;

    if (!state || !district) return;

    try {
      // Call our new API endpoint
      const response = await fetch(`/api/locations/towns?state=${encodeURIComponent(state)}&district=${encodeURIComponent(district)}`);
      const towns = await response.json();

      if (towns.length > 0) {
        towns.forEach(t => {
          let option = document.createElement("option");
          option.value = t.id; // IMPORTANT: We send the Town ID to the database!
          
          // Apply Marathi translation instantly if needed
          const currentLang = localStorage.getItem('language') || 'en';
          if (currentLang === 'mr' && typeof townTranslations !== 'undefined' && townTranslations[t.name]) {
            option.textContent = townTranslations[t.name];
          } else {
            option.textContent = t.name;
          }

          townSelect.appendChild(option);
        });
        townSelect.disabled = false;
      } else {
        townSelect.innerHTML = '<option value="">No villages found</option>';
      }
    } catch (error) {
      console.error("Error fetching villages:", error);
    }
  }
</script>
</body>
</html>
