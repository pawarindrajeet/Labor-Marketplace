<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Applicants - Shetkari-Kamgar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/custom-theme.css">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand text-success fw-bold" href="/dashboard"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm border-0 rounded-4 mb-4">
        <div class="card-body p-4 bg-success text-white rounded-4">
            <h2 class="fw-bold mb-1" th:text="${job.workType}">Job Title</h2>
            <p class="mb-0 opacity-75"><i class="bi bi-geo-alt"></i> <span th:text="${job.town.name}">Town</span> | <i class="bi bi-people"></i> Workers Needed: <span th:text="${job.workersNeeded}"></span></p>
        </div>
    </div>

    <h4 class="fw-bold text-dark mb-4"><i class="bi bi-people-fill text-primary"></i> Interested Workers</h4>

    <div th:if="${#lists.isEmpty(applicants)}" class="text-center py-5 bg-white rounded-4 shadow-sm">
        <i class="bi bi-person-exclamation display-1 text-muted mb-3"></i>
        <h5 class="text-muted">No one has applied for this job yet.</h5>
    </div>

    <div class="row g-3">
        <div th:each="app : ${applicants}" class="col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0 rounded-4 applicant-card" 
                 th:classappend="${app.status == 'Completed'} ? 'border-success border-2 bg-light' : ''">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h5 class="fw-bold mb-0 text-dark" th:text="${app.worker.name}">Worker Name</h5>
                            <span class="badge bg-light text-muted border" th:text="${app.worker.gender}">Gender</span>
                        </div>
                        
                        <span th:if="${app.status == 'Pending'}" class="badge bg-warning text-dark rounded-pill px-3 py-2">Pending</span>
                        <span th:if="${app.status == 'Accepted'}" class="badge bg-primary rounded-pill px-3 py-2">Waiting for Worker</span>
                        <span th:if="${app.status == 'Hired'}" class="badge bg-success rounded-pill px-3 py-2"><i class="bi bi-check-circle"></i> Active</span>
                        <span th:if="${app.status == 'Completed'}" class="badge bg-secondary rounded-pill px-3 py-2"><i class="bi bi-check2-all"></i> Finished</span>
                    </div>

                    <p class="mb-2"><i class="bi bi-telephone-fill text-success"></i> <strong>Contact:</strong> <span th:text="${app.worker.mobile}">Number</span></p>
                    <p class="small text-muted mb-4">Applied on: <span th:text="${#temporals.format(app.respondedAt, 'd MMM, h:mm a')}">Date</span></p>

                    <button th:if="${app.status == 'Pending'}" 
                            class="btn btn-outline-success w-100 fw-bold rounded-pill"
                            th:attr="onclick='acceptWorker(this, ' + ${app.id} + ')'">
                        <i class="bi bi-check-lg"></i> Accept Worker
                    </button>
                    
                    <button th:if="${app.status == 'Accepted'}" class="btn btn-primary w-100 fw-bold rounded-pill disabled opacity-50">
                        <i class="bi bi-hourglass-split"></i> Awaiting Worker Response
                    </button>

                    <div th:if="${app.status == 'Hired'}" class="mt-3 p-3 bg-light rounded border">
                        <label class="small fw-bold text-dark mb-2 d-block"><i class="bi bi-star-fill text-warning"></i> Rate Performance to finish:</label>
                        <div class="d-flex gap-2">
                            <select th:id="'rating-' + ${app.id}" class="form-select form-select-sm flex-grow-1">
                                <option value="5">5 ⭐ - Excellent</option>
                                <option value="4">4 ⭐ - Good</option>
                                <option value="3">3 ⭐ - Average</option>
                                <option value="2">2 ⭐ - Poor</option>
                                <option value="1">1 ⭐ - Terrible</option>
                            </select>
                            <button class="btn btn-sm btn-success fw-bold text-nowrap" 
                                    th:attr="onclick='finishJob(' + ${app.id} + ')'">
                                Complete
                            </button>
                        </div>
                    </div>

                    <div th:if="${app.status == 'Completed'}" class="mt-3 text-center text-success fw-bold">
                        <i class="bi bi-star-fill text-warning"></i> Rated: <span th:text="${app.rating}"></span>/5
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    function acceptWorker(button, responseId) {
        if(!confirm("Are you sure you want to hire this worker?")) return;

        fetch(`/api/jobs/responses/${responseId}/accept`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            }
        })
        .then(response => {
            if (response.ok) location.reload();
            else alert("Error: Could not accept worker.");
        })
        .catch(error => console.error('Error:', error));
    }

    function finishJob(responseId) {
        const ratingElement = document.getElementById('rating-' + responseId);
        const rating = ratingElement ? ratingElement.value : 5;

        if(!confirm(`Mark this job as completed with a ${rating}-star rating?`)) return;

        fetch(`/api/jobs/responses/${responseId}/complete?rating=${rating}`, {
            method: 'POST',
            headers: { [csrfHeader]: csrfToken }
        })
        .then(response => {
            if (response.ok) location.reload();
            else alert("Error: Could not complete job.");
        })
        .catch(error => console.error('Error:', error));
    }
</script>
</body>
</html>
